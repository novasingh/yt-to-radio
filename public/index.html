<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Listen to continuous, high-quality audio streams from YouTube videos and live streams on our 24/7 internet radio application.">
    <title>Live YouTube Radio Stream | Listen Now</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background" aria-hidden="true">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="container">
        <main class="player-card glass">
            <header class="header">
                <div class="badge" id="statusBadge">OFFLINE</div>
                <h1>LIVE RADIO</h1>
            </header>
            
            <div class="visualizer" aria-hidden="true">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <nav class="controls" aria-label="Audio controls">
                <button id="playBtn" class="play-btn" aria-label="Play or pause radio">
                    <svg viewBox="0 0 24 24" class="icon play-icon" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                    <svg viewBox="0 0 24 24" class="icon pause-icon" style="display:none;" aria-hidden="true"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    <svg viewBox="0 0 24 24" class="icon loading-icon" style="display:none; animation: spin 1s linear infinite;" aria-hidden="true"><path fill="currentColor" d="M12 2v4c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 21.523 2 16H6c0 3.314 2.686 6 6 6s6-2.686 6-6-2.686-6-6-6V2h4z"/></svg>
                </button>
            </nav>
            
            <audio id="audioPlayer" preload="none"></audio>
            
            <section class="stats">
                <span id="listeners">Listeners: 0</span>
            </section>
        </main>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
