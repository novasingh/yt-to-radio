version: '3.8'

services:
  radio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio-app
    restart: unless-stopped
    ports:
      # Maps host port 3000 to container port 3000
      - "3000:3000"
    volumes:
      # Persists SQLite database and cookies.txt inside a local './data' folder
      - ./data:/app/data
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      # Pass custom admin logins and JWT secret from local .env (or fallback to defaults)
      - SUPER_ADMIN_USER=${SUPER_ADMIN_USER:-admin}
      - SUPER_ADMIN_PASS=${SUPER_ADMIN_PASS:-admin123}
      - JWT_SECRET=${JWT_SECRET:-novasingh-yt-to-radio-super-secret-key-2026}
    logging:
      # Prevent Docker logs from consuming all VPS disk space
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
